services:
  - type: web
    name: explorerframe-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --keep-alive 5
    envVars:
      - key: MONGO_URI
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FLASK_ENV
        value: production
