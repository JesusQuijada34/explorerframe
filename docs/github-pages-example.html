<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Sitio con ExplorerFrame OAuth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 28px;
      color: #1f2937;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
    }

    .login-section {
      text-align: center;
    }

    .protected-section {
      display: none;
    }

    .user-card {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .user-card h2 {
      font-size: 18px;
      color: #1f2937;
      margin-bottom: 5px;
    }

    .user-id {
      font-family: 'JetBrains Mono', monospace;
      color: #667eea;
      font-size: 14px;
      word-break: break-all;
    }

    .api-key-section {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 12px;
    }

    .api-key-section label {
      display: block;
      color: #6b7280;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .api-key {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #1f2937;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: #5568d3;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .loading {
      display: none;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .success {
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⬡</div>
      <h1>ExplorerFrame</h1>
      <p class="subtitle">Autenticación segura con OAuth 2.0</p>
    </div>

    <div class="error" id="error-message"></div>
    <div class="success" id="success-message"></div>

    <!-- Sección de login -->
    <div class="login-section" id="login-section">
      <div id="explorerframe-login"></div>
    </div>

    <!-- Sección protegida -->
    <div class="protected-section" id="protected-section">
      <div class="user-card">
        <h2>Bienvenido</h2>
        <div class="user-id" id="user-id">Cargando...</div>
      </div>

      <div class="api-key-section">
        <label>Tu API Key:</label>
        <div class="api-key" id="api-key">Cargando...</div>
        <button class="copy-btn" onclick="copyToClipboard()">📋 Copiar</button>
      </div>

      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Autenticando...</p>
    </div>
  </div>

  <!-- Cargar el widget OAuth -->
  <script src="https://explorerframe.onrender.com/static/oauth-widget.js"></script>

  <script>
    // ⚠️ IMPORTANTE: Reemplaza estos valores con los tuyos
    const CONFIG = {
      clientId: 'app_xxx',  // Tu Client ID de ExplorerFrame
      redirectUri: 'https://tuusuario.github.io/turepositorio/callback.html',
      backendUrl: 'https://explorerframe.onrender.com'  // O tu backend propio
    };

    /**
     * Inicializar el widget
     */
    function initWidget() {
      ExplorerFrameOAuth.init({
        clientId: CONFIG.clientId,
        redirectUri: CONFIG.redirectUri,
        container: '#explorerframe-login',
        
        onSuccess: (data) => {
          console.log('✅ Autenticado:', data);
          showLoading(true);
          
          // Intercambiar código por token
          exchangeCodeForToken(data.code);
        },
        
        onError: (error) => {
          console.error('❌ Error:', error);
          showError(`Error en autenticación: ${error.message}`);
        }
      });

      // Verificar si ya está autenticado
      if (ExplorerFrameOAuth.isAuthenticated()) {
        showProtectedContent();
      }
    }

    /**
     * Intercambiar código por token
     */
    async function exchangeCodeForToken(code) {
      try {
        const response = await fetch(`${CONFIG.backendUrl}/api/oauth/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code,
            client_id: CONFIG.clientId,
            client_secret: 'secret_xxx',  // ⚠️ NO hagas esto en producción
            redirect_uri: CONFIG.redirectUri
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Token exchange failed');
        }

        const data = await response.json();
        
        // Guardar token
        sessionStorage.setItem('explorerframe_token', data.access_token);
        sessionStorage.setItem('explorerframe_user_id', data.user_id);

        // Mostrar contenido protegido
        showProtectedContent();
        showSuccess('¡Autenticación exitosa!');

      } catch (error) {
        console.error('Error:', error);
        showError(`Error: ${error.message}`);
        showLoading(false);
      }
    }

    /**
     * Mostrar contenido protegido
     */
    async function showProtectedContent() {
      try {
        // Obtener información del usuario
        const userInfo = await ExplorerFrameOAuth.getUserInfo();
        
        document.getElementById('user-id').textContent = userInfo.user_id;
        document.getElementById('api-key').textContent = userInfo.api_key;
        
        // Mostrar/ocultar secciones
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('protected-section').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        
      } catch (error) {
        console.error('Error:', error);
        showError(`Error al obtener información: ${error.message}`);
        showLoading(false);
      }
    }

    /**
     * Cerrar sesión
     */
    function logout() {
      ExplorerFrameOAuth.logout();
      
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('protected-section').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      
      showSuccess('Sesión cerrada');
      
      // Limpiar URL
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    /**
     * Copiar API Key al portapapeles
     */
    function copyToClipboard() {
      const apiKey = document.getElementById('api-key').textContent;
      navigator.clipboard.writeText(apiKey).then(() => {
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = '✓ Copiado';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      });
    }

    /**
     * Mostrar/ocultar loading
     */
    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    /**
     * Mostrar error
     */
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }

    /**
     * Mostrar éxito
     */
    function showSuccess(message) {
      const successDiv = document.getElementById('success-message');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      setTimeout(() => {
        successDiv.style.display = 'none';
      }, 3000);
    }

    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', initWidget);
  </script>
</body>
</html>
