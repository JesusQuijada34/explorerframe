<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No disponible — ExplorerFrame</title>
  <link rel="icon" type="image/x-icon" href="/app/app-icon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .error-glow { text-shadow: 0 0 40px rgba(251,191,36,0.4); }
    .platform-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
      border-radius: 999px; padding: .35rem 1rem;
      font-size: .75rem; color: #fbbf24;
      font-family: 'JetBrains Mono', monospace; margin-bottom: 2rem;
    }
    .big-icon { font-size: 5rem; margin-bottom: 1.5rem; display: block; }
    .error-title {
      font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 700;
      background: linear-gradient(135deg, #fbbf24, #f87171);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 1rem;
    }
    .error-sub { color: var(--muted); font-size: 1rem; max-width: 480px; line-height: 1.7; margin-bottom: 2rem; }
    .os-list {
      display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center;
      margin-bottom: 2.5rem;
    }
    .os-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem 1rem;
      font-size: .82rem; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .os-chip.blocked { border-color: rgba(248,113,113,0.4); color: var(--red); }
    .os-chip.ok { border-color: rgba(34,211,160,0.4); color: var(--green); }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">⬡ Explorer<span>Frame</span></a>
</nav>

<div class="hero" style="min-height:100vh;">
  <div class="platform-badge">⚠️ Plataforma no compatible</div>
  <span class="big-icon error-glow">🪟</span>
  <h1 class="error-title">Solo para Windows</h1>
  <p class="error-sub">
    ExplorerFrame es una herramienta de administración remota diseñada exclusivamente
    para equipos Windows. Tu sistema operativo actual no es compatible.
  </p>

  <div class="os-list">
    <div class="os-chip ok">✅ Windows 10 / 11</div>
    <div class="os-chip blocked">❌ Linux</div>
    <div class="os-chip blocked">❌ macOS</div>
    <div class="os-chip blocked">❌ Android</div>
    <div class="os-chip blocked">❌ iOS</div>
  </div>

  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
    <a href="/" class="btn btn-outline">← Volver al inicio</a>
  </div>
</div>
</body>
</html>
