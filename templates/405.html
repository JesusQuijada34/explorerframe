<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>405 — ExplorerFrame</title>
  <link rel="icon" type="image/x-icon" href="/app/app-icon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, #f87171, #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1; margin-bottom: 1rem;
    }
    .error-title { font-size: 1.4rem; font-weight: 600; margin-bottom: .75rem; }
    .error-sub { color: var(--muted); font-size: .95rem; max-width: 460px; line-height: 1.7; margin-bottom: 2rem; }
    .method-box {
      background: var(--surface2); border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px; padding: 1rem 1.5rem;
      font-family: 'JetBrains Mono', monospace; font-size: .82rem;
      color: var(--red); margin-bottom: 2rem; max-width: 420px; width: 100%;
    }
    .method-box span { color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">⬡ Explorer<span>Frame</span></a>
</nav>
<div class="hero" style="min-height:100vh;">
  <div class="code">405</div>
  <h1 class="error-title">Método no permitido</h1>
  <p class="error-sub">
    El método HTTP que usaste no está permitido para esta URL.
    Revisa si debes usar <code>GET</code>, <code>POST</code> u otro método.
  </p>
  <div class="method-box">
    <span>método recibido → </span>{{ request.method }}<br/>
    <span>ruta → </span>{{ request.path }}
  </div>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
    <a href="/" class="btn btn-primary">← Inicio</a>
    <a href="javascript:history.back()" class="btn btn-outline">Volver</a>
  </div>
</div>
</body>
</html>
