<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — ExplorerFrame</title>
  <link rel="icon" type="image/x-icon" href="/app/app-icon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<nav>
  <a class="nav-logo" href="/">⬡ Explorer<span>Frame</span></a>
  <div class="nav-links">
    <a href="/register/" class="btn-nav">Registrarse</a>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">
      <h2>⬡ ExplorerFrame</h2>
      <p>Iniciar sesión</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login/">
      <div class="form-group">
        <label for="username">Username o ID de Telegram</label>
        <input type="text" id="username" name="username"
               placeholder="@tuusuario o 123456789" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="Tu contraseña" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Iniciar sesión →
      </button>
    </form>

    <div class="telegram-login-wrapper">
      <p class="telegram-label">O inicia sesión con Telegram:</p>
      <div class="telegram-widget">
        <script async src="https://telegram.org/js/telegram-widget.js?23"
          data-telegram-login="explorerframebot"
          data-size="large"
          data-onauth="onTelegramAuth(user)"
          data-request-access="write">
        </script>
      </div>
    </div>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="/register/">Regístrate</a>
    </div>
  </div>
</div>

<script type="text/javascript">
function onTelegramAuth(user) {
  // Mostrar información de la cuenta en la consola
  console.info('Datos de la cuenta:', {
    id: user.id,
    first_name: user.first_name,
    last_name: user.last_name || 'N/A',
    username: user.username || 'N/A',
    photo_url: user.photo_url || 'N/A',
    auth_date: user.auth_date,
    hash: user.hash
  });

  // Enviar datos de Telegram al servidor
  fetch('/telegram-login/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(user)
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      // Redirigir al dashboard
      window.location.href = '/dashboard/';
    } else {
      alert('Error: ' + (data.error || 'No se pudo iniciar sesión'));
    }
  })
  .catch(error => {
    console.error('Error:', error);
    alert('Error al conectar con el servidor');
  });
}
</script>
</body>
</html>
