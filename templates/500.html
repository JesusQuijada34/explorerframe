<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — ExplorerFrame</title>
  <link rel="icon" type="image/x-icon" href="/app/app-icon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, #f87171, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1; margin-bottom: 1rem;
    }
    .error-title { font-size: 1.4rem; font-weight: 600; margin-bottom: .75rem; }
    .error-sub { color: var(--muted); font-size: .95rem; max-width: 460px; line-height: 1.7; margin-bottom: 2rem; }
    .pulse {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; background: var(--red);
      animation: pulse 1.4s ease-in-out infinite;
      margin-right: .5rem; vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }
    .error-details {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.5rem; margin-top: 2rem;
      max-width: 600px; text-align: left;
    }
    .error-details h3 { margin: 0 0 0.75rem 0; font-size: 0.95rem; color: var(--red); }
    .error-details code {
      display: block; background: var(--surface); padding: 1rem;
      border-radius: 4px; font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; color: var(--muted); overflow-x: auto;
      white-space: pre-wrap; word-break: break-word;
    }
    .error-trace {
      margin-top: 1rem; font-size: 0.75rem; color: var(--muted);
      max-height: 300px; overflow-y: auto;
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">⬡ Explorer<span>Frame</span></a>
</nav>
<div class="hero" style="min-height:100vh;">
  <div class="code">500</div>
  <h1 class="error-title"><span class="pulse"></span>Error interno del servidor</h1>
  <p class="error-sub">
    Algo salió mal en el servidor. El error fue registrado automáticamente.
    Intenta de nuevo en unos momentos.
  </p>
  
  {% if error %}
  <div class="error-details">
    <h3>📋 Detalles del error:</h3>
    <code>{{ error }}</code>
    {% if trace %}
    <div class="error-trace">
      <strong>Stack trace:</strong>
      <code>{{ trace }}</code>
    </div>
    {% endif %}
  </div>
  {% endif %}
  
  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-top:2rem;">
    <a href="/" class="btn btn-primary">← Inicio</a>
    <a href="javascript:location.reload()" class="btn btn-outline">Reintentar</a>
  </div>
</div>
</body>
</html>
