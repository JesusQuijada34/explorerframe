<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — ExplorerFrame</title>
  <link rel="icon" type="image/x-icon" href="/app/app-icon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, #f87171, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1; margin-bottom: 1rem;
    }
    .error-title { font-size: 1.4rem; font-weight: 600; margin-bottom: .75rem; }
    .error-sub { color: var(--muted); font-size: .95rem; max-width: 460px; line-height: 1.7; margin-bottom: 2rem; }
    .pulse {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; background: var(--red);
      animation: pulse 1.4s ease-in-out infinite;
      margin-right: .5rem; vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">⬡ Explorer<span>Frame</span></a>
</nav>
<div class="hero" style="min-height:100vh;">
  <div class="code">500</div>
  <h1 class="error-title"><span class="pulse"></span>Error interno del servidor</h1>
  <p class="error-sub">
    Algo salió mal en el servidor. El error fue registrado automáticamente.
    Intenta de nuevo en unos momentos.
  </p>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
    <a href="/" class="btn btn-primary">← Inicio</a>
    <a href="javascript:location.reload()" class="btn btn-outline">Reintentar</a>
  </div>
</div>
</body>
</html>
